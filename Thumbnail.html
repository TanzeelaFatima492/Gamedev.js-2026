<!DOCTYPE html>
<html>
<head>
    <title>Machine Manager - Thumbnail</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a12 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            padding: 20px;
        }
        .thumbnail {
            width: 630px;
            height: 500px;
            background: linear-gradient(135deg, #12121c 0%, #0a0a12 100%);
            border-radius: 20px;
            border: 3px solid #ff6b35;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }
        h1 {
            font-size: 48px;
            color: #ff6b35;
            margin-bottom: 10px;
            letter-spacing: 4px;
        }
        .sub {
            color: #ffaa44;
            font-size: 14px;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }
        .meters {
            width: 80%;
            margin: 20px 0;
        }
        .meter {
            margin: 15px 0;
        }
        .meter-label {
            color: white;
            font-size: 14px;
            margin-bottom: 5px;
        }
        .meter-bar {
            background: #1a1a2a;
            height: 25px;
            border-radius: 12px;
            overflow: hidden;
        }
        .temp-fill {
            width: 65%;
            height: 100%;
            background: linear-gradient(90deg, #00cc66, #ff4444);
            border-radius: 12px;
        }
        .pressure-fill {
            width: 48%;
            height: 100%;
            background: linear-gradient(90deg, #00cc66, #ffaa00);
            border-radius: 12px;
        }
        .buttons {
            display: flex;
            gap: 15px;
            margin: 25px 0;
        }
        .btn {
            padding: 10px 25px;
            background: #ff6b35;
            border-radius: 30px;
            color: white;
            font-weight: bold;
        }
        .tag {
            position: absolute;
            bottom: 15px;
            font-size: 10px;
            color: #666;
        }
        .badge {
            background: #ff6b35;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            color: white;
            margin-top: 10px;
        }
        .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="thumbnail">
        <div class="icon">⚙️🏭⚙️</div>
        <h1>MACHINE MANAGER</h1>
        <div class="sub">Keep Temperature & Pressure in check!</div>
        
        <div class="meters">
            <div class="meter">
                <div class="meter-label">🌡️ TEMPERATURE</div>
                <div class="meter-bar"><div class="temp-fill"></div></div>
            </div>
            <div class="meter">
                <div class="meter-label">💨 PRESSURE</div>
                <div class="meter-bar"><div class="pressure-fill"></div></div>
            </div>
        </div>
        
        <div class="buttons">
            <div class="btn">❄️ COOL</div>
            <div class="btn">💨 VENT</div>
        </div>
        
        <div class="badge">🏆 CAN YOU SURVIVE 120 SECONDS? 🏆</div>
        <div class="tag">Gamedev.js Jam 2026 | Theme: MACHINES | Ethereum Challenge</div>
    </div>
</body>
</html>
